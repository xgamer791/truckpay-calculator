<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DriverPay Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0f172a; color: white; font-family: -apple-system, sans-serif; padding: 15px; overflow-x: hidden; }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; }
        
        textarea { 
            background: rgba(0, 0, 0, 0.5) !important; 
            border: 1px solid rgba(255, 255, 255, 0.3) !important; 
            color: #fff !important; 
            border-radius: 12px;
            font-size: 18px !important;
        }

        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); width: 100%; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 800; }
        .details-panel { display: none; margin-top: 16px; padding-top: 16px; border-top: 2px solid rgba(255,255,255,0.1); }
        .expanded .details-panel { display: block; }

        @keyframes subtle-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .blink-current {
            animation: subtle-blink 2s ease-in-out infinite;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.1em;
        }

        .swipe-container { 
            position: relative; 
            overflow: hidden; 
            background: #ef4444; 
            width: 100%; 
            border-radius: 14px;
            margin-bottom: 8px;
            touch-action: pan-y;
        }

        .delete-box-flat {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 11px;
            color: white;
            letter-spacing: 1px;
            z-index: 1;
        }

        .swipe-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 16px; 
            background: #1e293b; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
            position: relative; 
            z-index: 2; 
        }

        .swiped .swipe-content { transform: translateX(-90px); }

        .day-header-text { font-size: 16px; font-weight: 900; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.05em; }
        .day-total-text { font-size: 16px; font-weight: 900; color: white; }
        .mileage-pay-text { font-size: 1.125rem; font-weight: 700; color: white; }
        
        .edit-btn { color: #60a5fa; font-size: 11px; font-weight: 800; border: none; background: none; padding: 0; margin-left: 4px; text-transform: uppercase; }
    </style>
</head>
<body>
    <header class="pt-10 pb-12 px-1 text-left">
        <h1 class="text-4xl font-black italic tracking-tight">DriverPay <span class="text-blue-500">Pro</span></h1>
        <p class="text-gray-400 text-sm font-bold mt-1">25 Ton Avg @ 30% Commission</p>
    </header>

    <div class="glass p-6 mb-10">
        <div class="flex flex-col gap-5">
            <div>
                <div class="flex justify-between items-center px-1 mb-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-wider">New Loads (Miles)</label>
                    <button onclick="document.getElementById('mileageInput').value = ''" class="text-xs text-red-400 font-black">CLEAR</button>
                </div>
                <textarea id="mileageInput" placeholder="e.g. 52, 100, 36..." rows="3" class="w-full p-4"></textarea>
            </div>
            <button id="saveBtn" onclick="calculateAndSave()" class="btn-primary active:scale-95">Add to Current Period</button>
        </div>
    </div>

    <div id="historyList" class="space-y-4"></div>

    <script>
        const rateData = [[2,3.84],[3,3.97],[6,4.38],[8,4.65],[11,5.06],[13,5.46],[14,5.43],[16,6.03],[17,6.00],[21,6.75],[25,7.32],[27,7.36],[30,8.01],[39,10.26],[45,11.24],[49,10.15],[61,14.40],[62,14.72],[65,15.42],[92,16.07]];
        
        function getRate(m){
            if(m<=2) return 3.84;
            if(m>=92){ let s=(16.07-15.42)/(92-65); return 16.07+(m-92)*s; }
            for(let i=0; i<rateData.length-1; i++){
                let m1=rateData[i][0], r1=rateData[i][1], m2=rateData[i+1][0], r2=rateData[i+1][1];
                if(m>=m1 && m<=m2) return r1+(m-m1)*((r2-r1)/(m2-m1));
            }
            return 0;
        }

        function calculateAndSave(){
            const r = document.getElementById('mileageInput').value;
            if(!r) return;
            const newMiles = r.split(',').map(m=>parseFloat(m.trim())).filter(m=>!isNaN(m));
            
            const now = new Date();
            const isoDate = now.toISOString().split('T')[0];
            const currentDayName = now.toLocaleDateString('en-US', { weekday: 'long' });
            
            const payoutDate = getPayoutDate(isoDate);
            modifySettlement(payoutDate, newMiles, currentDayName);
            
            document.getElementById('mileageInput').value = '';
            renderHistory();
        }

        function getPayoutDate(dateStr) {
            let d = new Date(dateStr + 'T00:00:00');
            let day = d.getDay(); 
            
            let daysToSaturday;
            // Friday(5) and Saturday(6) are the start of the pay period
            if (day >= 5) {
                daysToSaturday = (6 - day) + 7;
            } else {
                daysToSaturday = (6 - day);
            }
            
            d.setDate(d.getDate() + daysToSaturday);
            return d.toISOString().split('T')[0];
        }

        function modifySettlement(payoutDate, milesArray, dayName) {
            let history = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const idx = history.findIndex(e => e.payoutDate === payoutDate);
            const newEntries = milesArray.map(m => ({ 
                id: Math.random().toString(36).substr(2, 9), 
                miles: m, 
                tons: 25, 
                day: dayName 
            }));
            if(idx !== -1) history[idx].loads = [...history[idx].loads, ...newEntries];
            else history.unshift({ id: Date.now(), payoutDate, loads: newEntries });
            localStorage.setItem('driver_history', JSON.stringify(history));
        }

        function removeLoad(sId, lId) {
            let h = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const sIdx = h.findIndex(s => s.id == sId);
            if(sIdx !== -1) {
                h[sIdx].loads = h[sIdx].loads.filter(l => l.id != lId);
                if(h[sIdx].loads.length === 0) h.splice(sIdx, 1);
                localStorage.setItem('driver_history', JSON.stringify(h));
                renderHistory();
            }
        }

        function editTons(sId, lId) {
            const newTons = prompt("Enter new tonnage:");
            if (newTons && !isNaN(newTons)) {
                let h = JSON.parse(localStorage.getItem('driver_history') || '[]');
                const sIdx = h.findIndex(s => s.id == sId);
                const lIdx = h[sIdx].loads.findIndex(l => l.id == lId);
                h[sIdx].loads[lIdx].tons = parseFloat(newTons);
                localStorage.setItem('driver_history', JSON.stringify(h));
                renderHistory();
            }
        }

        function renderHistory(){
            const history = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            const latestDate = history.length > 0 
                ? Math.max(...history.map(e => new Date(e.payoutDate).getTime())) 
                : null;

            history.forEach(entry => {
                let totalNet = 0;
                const grouped = {};
                const isCurrent = new Date(entry.payoutDate).getTime() === latestDate;

                entry.loads.forEach(l => {
                    const pay = (getRate(l.miles) * l.tons * 0.30);
                    totalNet += pay;
                    if(!grouped[l.day]) grouped[l.day] = [];
                    grouped[l.day].push({ ...l, pay });
                });

                let breakdownHtml = '';
                for(const day in grouped) {
                    const dayTotal = grouped[day].reduce((sum, item) => sum + item.pay, 0);
                    breakdownHtml += `
                        <div class="mb-6">
                            <div class="flex justify-between items-center mb-3 px-1">
                                <span class="day-header-text">${day}</span>
                                <span class="day-total-text">$${dayTotal.toFixed(2)}</span>
                            </div>
                            ${grouped[day].map(l => `
                                <div class="swipe-container" id="container-${l.id}">
                                    <div class="delete-box-flat" onclick="removeLoad('${entry.id}', '${l.id}')">DELETE</div>
                                    <div class="swipe-content" 
                                         ontouchstart="ts(event, '${l.id}')" 
                                         ontouchmove="tm(event, '${l.id}')"
                                         ontouchend="te(event, '${l.id}')">
                                        <div class="flex flex-col">
                                            <span class="text-lg font-bold text-gray-100">${l.miles} miles</span>
                                            <div class="flex items-center text-[10px] text-gray-500 font-bold uppercase">
                                                <span>${l.tons} TONS</span>
                                                <button onclick="editTons('${entry.id}', '${l.id}')" class="edit-btn">EDIT</button>
                                            </div>
                                        </div>
                                        <span class="mileage-pay-text">$${l.pay.toFixed(2)}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>`;
                }

                const card = document.createElement('div');
                card.className = 'glass p-6';
                card.onclick = (e) => { if(!e.target.closest('.swipe-container') && !e.target.closest('button')) card.classList.toggle('expanded'); };
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div>
                                <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Settlement</p>
                                <p class="text-xl font-black tracking-tight">${new Date(entry.payoutDate + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'})}</p>
                            </div>
                            ${isCurrent ? '<span class="blink-current text-blue-500/80 mt-4">CURRENT</span>' : ''}
                        </div>
                        <p class="text-2xl font-black text-green-400 tracking-tighter">$${totalNet.toFixed(2)}</p>
                    </div>
                    <div class="details-panel" onclick="event.stopPropagation()">
                        ${breakdownHtml}
                        <div class="flex gap-2 mt-4">
                            <button onclick="addManualToCard('${entry.id}', '${entry.payoutDate}')" class="flex-1 bg-blue-500/20 text-blue-400 py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95">+ Add Load</button>
                            <button onclick="if(confirm('Delete settlement?')){ localStorage.setItem('driver_history', JSON.stringify(JSON.parse(localStorage.getItem('driver_history')).filter(s=>s.id!='${entry.id}'))); renderHistory(); }" class="flex-1 bg-red-500/10 text-red-400 py-4 rounded-xl font-black text-xs uppercase tracking-widest text-center active:scale-95">Delete All</button>
                        </div>
                    </div>`;
                list.appendChild(card);
            });
        }

        let xStart = null;
        function ts(e, id) { xStart = e.touches[0].clientX; }
        function tm(e, id) {
            if (!xStart) return;
            let xDiff = xStart - e.touches[0].clientX;
            const el = document.getElementById('container-' + id);
            if (xDiff > 40) {
                document.querySelectorAll('.swipe-container').forEach(c => { if(c.id !== 'container-'+id) c.classList.remove('swiped'); });
                el.classList.add('swiped');
            } else if (xDiff < -40) {
                el.classList.remove('swiped');
            }
        }
        function te() { xStart = null; }

        function addManualToCard(sId, pDate) {
            const m = prompt("Enter mileage:");
            if(m && !isNaN(m)) modifySettlement(pDate, [parseFloat(m)], prompt("Enter Day (e.g. Monday):"));
            renderHistory();
        }

        renderHistory();
    </script>
</body>
</html>
