<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DriverPay Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { touch-action: manipulation; }
        body { background: #0f172a; color: white; font-family: -apple-system, sans-serif; padding: 15px; overflow-x: hidden; }
        button, textarea, input { touch-action: manipulation; font-size: 16px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; }
        textarea { background: rgba(0, 0, 0, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.3) !important; color: #fff !important; border-radius: 12px; font-size: 18px !important; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); width: 100%; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 800; }
        .details-panel { display: none; margin-top: 16px; padding-top: 16px; border-top: 2px solid rgba(255,255,255,0.1); }
        .expanded .details-panel { display: block; }
        @keyframes subtle-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .blink-current { animation: subtle-blink 2s ease-in-out infinite; font-size: 10px; font-weight: 900; letter-spacing: 0.1em; }
        .swipe-container { position: relative; overflow: hidden; background: #1e293b; width: 100%; border-radius: 14px; margin-bottom: 8px; touch-action: pan-y; }
        .delete-box-flat { position: absolute; right: 0; top: 0; bottom: 0; width: 90px; background: #ef4444; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; color: white; letter-spacing: 1px; z-index: 1; }
        .upload-box-flat { position: absolute; left: 0; top: 0; bottom: 0; width: 90px; background: #3b82f6; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; color: white; letter-spacing: 1px; z-index: 1; }
        .swipe-content { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #1e293b; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1); position: relative; z-index: 2; }
        .swiped .swipe-content { transform: translateX(-90px); }
        .swiped-right .swipe-content { transform: translateX(90px); }
        .day-header-text { font-size: 16px; font-weight: 900; color: #60a5fa; text-transform: uppercase; letter-spacing: 0.05em; }
        .day-total-text { font-size: 19px; font-weight: 900; color: #4ade80; }
        .mileage-pay-text { font-size: 1.125rem; font-weight: 700; color: white; }
        .edit-btn { color: #60a5fa; font-size: 11px; font-weight: 800; border: none; background: none; padding: 0; margin-left: 4px; text-transform: uppercase; }
        .day-section { margin-bottom: 24px; }
        .day-section.collapsed { margin-bottom: 12px; }
        .day-section.collapsed .day-loads { display: none; }
        .day-header { cursor: pointer; -webkit-user-select: none; user-select: none; }
        .ticket-icon { display: inline-flex; align-items: center; justify-content: center; color: #3b82f6; margin-left: 10px; padding: 4px; cursor: pointer; flex-shrink: 0; }
        .ticket-icon:active { opacity: 0.6; }
        .ticket-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .ticket-overlay img { max-width: 100%; max-height: 70vh; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .ticket-overlay-actions { display: flex; gap: 10px; margin-top: 24px; width: 100%; max-width: 420px; }
        .ticket-overlay-actions button { flex: 1; padding: 16px 8px; border: none; border-radius: 12px; font-weight: 900; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: white; }

        /* ===== FOOTER ===== */
        .pro-footer { margin-top: 60px; padding: 32px 4px 40px; position: relative; }
        .pro-footer::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px; background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.5), transparent); }
        .footer-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 28px; }
        .footer-stat { text-align: center; padding: 16px 4px; background: rgba(255, 255, 255, 0.02); border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.04); color: white; cursor: pointer; transition: all 0.15s; font-family: inherit; position: relative; overflow: hidden; }
        .footer-stat::after { content: ''; position: absolute; top: 0; right: 0; width: 28px; height: 28px; background: radial-gradient(circle at top right, rgba(74, 222, 128, 0.15), transparent 70%); pointer-events: none; }
        .footer-stat:active { transform: scale(0.96); background: rgba(74, 222, 128, 0.05); border-color: rgba(74, 222, 128, 0.2); }
        .footer-stat-value { font-size: 20px; font-weight: 900; letter-spacing: -0.02em; line-height: 1; color: #4ade80; }
        .footer-stat-label { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 7px; }
        .footer-stat-icon { position: absolute; top: 6px; right: 6px; color: #4ade80; opacity: 0.5; }
        .footer-road { display: flex; justify-content: center; gap: 6px; margin-bottom: 22px; opacity: 0.4; }
        .footer-road-dash { width: 18px; height: 2px; background: #3b82f6; border-radius: 1px; }
        .footer-road-dash:nth-child(2) { opacity: 0.6; }
        .footer-road-dash:nth-child(3) { opacity: 0.3; }
        .footer-brand { text-align: center; }
        .footer-mark { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .footer-mark-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); border-radius: 8px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35); }
        .footer-mark-text { font-size: 14px; font-weight: 900; font-style: italic; letter-spacing: -0.02em; }
        .footer-mark-text span { color: #3b82f6; }
        .footer-tagline { font-size: 10px; font-weight: 900; letter-spacing: 0.25em; color: #475569; text-transform: uppercase; margin-bottom: 16px; position: relative; display: inline-block; }
        .footer-tagline::before, .footer-tagline::after { content: ''; position: absolute; top: 50%; width: 24px; height: 1px; background: #334155; }
        .footer-tagline::before { right: calc(100% + 12px); }
        .footer-tagline::after { left: calc(100% + 12px); }
        .footer-meta { display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 10px; font-weight: 700; color: #475569; }
        .footer-meta-dot { width: 3px; height: 3px; background: #334155; border-radius: 50%; }
        .footer-version { color: #3b82f6; font-weight: 900; }

        /* ===== CHART MODAL ===== */
        .chart-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 10000; display: none; align-items: flex-end; opacity: 0; transition: opacity 0.25s ease; }
        .chart-overlay.active { display: flex; opacity: 1; }
        .chart-modal { width: 100%; background: #0f172a; border-top-left-radius: 28px; border-top-right-radius: 28px; border-top: 1px solid rgba(255,255,255,0.1); padding: 20px 22px 32px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .chart-overlay.active .chart-modal { transform: translateY(0); }
        .chart-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 20px; }
        .chart-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
        .chart-eyebrow { font-size: 10px; font-weight: 900; color: #3b82f6; letter-spacing: 0.2em; margin-bottom: 4px; }
        .chart-title { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; color: white; }
        .chart-total { font-size: 28px; font-weight: 900; color: #4ade80; letter-spacing: -0.03em; line-height: 1; }
        .chart-bars { display: flex; align-items: flex-end; justify-content: space-around; gap: 4px; height: 220px; padding: 24px 4px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; min-width: 0; }
        .chart-bar-value { font-size: 9px; font-weight: 800; color: #94a3b8; margin-bottom: 6px; white-space: nowrap; letter-spacing: -0.02em; min-height: 11px; }
        .chart-bar-track { flex: 1; width: 100%; display: flex; align-items: flex-end; padding: 0 2px; }
        .chart-bar { width: 100%; background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%); border-radius: 4px 4px 0 0; height: 0; transition: height 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 16px rgba(74, 222, 128, 0.25); }
        .chart-bar.empty { background: rgba(255,255,255,0.06); box-shadow: none; }
        .chart-bar-label { font-size: 10px; font-weight: 800; color: #64748b; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        .chart-empty { text-align: center; padding: 60px 20px; color: #64748b; font-size: 13px; font-weight: 700; }
        .chart-close { width: 100%; margin-top: 24px; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 14px; font-weight: 900; font-size: 12px; letter-spacing: 0.15em; cursor: pointer; font-family: inherit; }
        .chart-close:active { transform: scale(0.98); background: rgba(255,255,255,0.08); }
    </style>
</head>
<body>
    <header class="pt-10 pb-12 px-1 text-left">
        <h1 class="text-4xl font-black italic tracking-tight">DriverPay <span class="text-blue-500">Pro</span></h1>
        <p class="text-gray-400 text-sm font-bold mt-1">25 Ton Avg @ 30% Commission</p>
    </header>

    <div class="glass p-6 mb-10">
        <div class="flex flex-col gap-5">
            <div>
                <div class="flex justify-between items-center px-1 mb-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-wider">New Loads (Miles)</label>
                    <button onclick="document.getElementById('mileageInput').value = ''" class="text-xs text-red-400 font-black">CLEAR</button>
                </div>
                <textarea id="mileageInput" placeholder="e.g. 52, 100, 36..." rows="3" class="w-full p-4"></textarea>
            </div>
            <button id="saveBtn" type="button" onclick="calculateAndSave()" class="btn-primary active:scale-95">Add to Current Period</button>
        </div>
    </div>

    <div id="historyList" class="space-y-4"></div>

    <!-- ===== FOOTER ===== -->
    <footer class="pro-footer">
        <div class="footer-stats">
            <button class="footer-stat" onclick="showRevenueChart('month')">
                <svg class="footer-stat-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
                <div class="footer-stat-value" id="footerMonthly">$0</div>
                <div class="footer-stat-label">This Month</div>
            </button>
            <button class="footer-stat" onclick="showRevenueChart('year')">
                <svg class="footer-stat-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
                <div class="footer-stat-value" id="footerYearly">$0</div>
                <div class="footer-stat-label">This Year</div>
            </button>
            <button class="footer-stat" onclick="showRevenueChart('lifetime')">
                <svg class="footer-stat-icon" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l9.2-9.2M17 17V7H7"/></svg>
                <div class="footer-stat-value" id="footerLifetime">$0</div>
                <div class="footer-stat-label">Lifetime</div>
            </button>
        </div>

        <div class="footer-road">
            <div class="footer-road-dash"></div>
            <div class="footer-road-dash"></div>
            <div class="footer-road-dash"></div>
        </div>

        <div class="footer-brand">
            <div class="footer-mark">
                <div class="footer-mark-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 17h4V5H2v12h3"/>
                        <path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5"/>
                        <path d="M14 17h1"/>
                        <circle cx="7.5" cy="17.5" r="2.5"/>
                        <circle cx="17.5" cy="17.5" r="2.5"/>
                    </svg>
                </div>
                <div class="footer-mark-text">DriverPay <span>Pro</span></div>
            </div>
            <div class="footer-tagline">Built for the long haul</div>
            <div class="footer-meta">
                <span class="footer-version">v2.0</span>
                <span class="footer-meta-dot"></span>
                <span>© 2026</span>
                <span class="footer-meta-dot"></span>
                <span>Local-First</span>
            </div>
        </div>
    </footer>

    <!-- ===== CHART MODAL ===== -->
    <div class="chart-overlay" id="chartOverlay">
        <div class="chart-modal">
            <div class="chart-handle"></div>
            <div class="chart-header">
                <div>
                    <div class="chart-eyebrow">REVENUE</div>
                    <div class="chart-title" id="chartTitle">This Month</div>
                </div>
                <div class="chart-total" id="chartTotal">$0</div>
            </div>
            <div id="chartBody">
                <div class="chart-bars" id="chartBars"></div>
            </div>
            <button class="chart-close" onclick="closeChart()">CLOSE</button>
        </div>
    </div>

    <script>
        const rateData = [[2,3.84],[3,3.97],[6,4.38],[8,4.65],[11,5.06],[13,5.46],[14,5.43],[16,6.03],[17,6.00],[21,6.75],[25,7.32],[27,7.36],[30,8.01],[39,10.26],[45,11.24],[49,10.15],[61,14.40],[62,14.72],[65,15.42],[92,16.07]];
        function getRate(m){
            if(m<=2) return 3.84;
            if(m>=92){ let s=(16.07-15.42)/(92-65); return 16.07+(m-92)*s; }
            for(let i=0; i<rateData.length-1; i++){
                let m1=rateData[i][0], r1=rateData[i][1], m2=rateData[i+1][0], r2=rateData[i+1][1];
                if(m>=m1 && m<=m2) return r1+(m-m1)*((r2-r1)/(m2-m1));
            }
            return 0;
        }
        function calculateAndSave(){
            try {
                const r = document.getElementById('mileageInput').value;
                if(!r) { alert('Input is empty'); return; }
                const newMiles = r.split(',').map(m=>parseFloat(m.trim())).filter(m=>!isNaN(m));
                if(newMiles.length === 0) { alert('No valid numbers found'); return; }
                const now = new Date();
                const isoDate = now.toISOString().split('T')[0];
                const currentDayName = now.toLocaleDateString('en-US', { weekday: 'long' });
                const payoutDate = getPayoutDate(isoDate);
                modifySettlement(payoutDate, newMiles, currentDayName);
                document.getElementById('mileageInput').value = '';
                renderHistory();
            } catch (err) { alert('ERROR: ' + (err && err.message ? err.message : err)); }
        }
        function getPayoutDate(dateStr) {
            let d = new Date(dateStr + 'T00:00:00');
            let day = d.getDay();
            let daysToSaturday;
            if (day >= 5) { daysToSaturday = (6 - day) + 7; } else { daysToSaturday = (6 - day); }
            d.setDate(d.getDate() + daysToSaturday);
            return d.toISOString().split('T')[0];
        }
        function modifySettlement(payoutDate, milesArray, dayName) {
            let history = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const idx = history.findIndex(e => e.payoutDate === payoutDate);
            const newEntries = milesArray.map(m => ({ id: Math.random().toString(36).substr(2, 9), miles: m, tons: 25, day: dayName }));
            if(idx !== -1) history[idx].loads = [...history[idx].loads, ...newEntries];
            else history.unshift({ id: Date.now(), payoutDate, loads: newEntries });
            localStorage.setItem('driver_history', JSON.stringify(history));
        }
        function removeLoad(sId, lId) {
            let h = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const sIdx = h.findIndex(s => s.id == sId);
            if(sIdx !== -1) {
                h[sIdx].loads = h[sIdx].loads.filter(l => l.id != lId);
                if(h[sIdx].loads.length === 0) h.splice(sIdx, 1);
                localStorage.setItem('driver_history', JSON.stringify(h));
                renderHistory();
            }
        }
        function editTons(sId, lId) {
            const newTons = prompt("Enter new tonnage:");
            if (newTons && !isNaN(newTons)) {
                let h = JSON.parse(localStorage.getItem('driver_history') || '[]');
                const sIdx = h.findIndex(s => s.id == sId);
                const lIdx = h[sIdx].loads.findIndex(l => l.id == lId);
                h[sIdx].loads[lIdx].tons = parseFloat(newTons);
                localStorage.setItem('driver_history', JSON.stringify(h));
                renderHistory();
            }
        }
        function toggleDay(headerEl, evt) {
            if (evt) evt.stopPropagation();
            headerEl.parentElement.classList.toggle('collapsed');
        }

        function compressImage(file, maxWidth, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        try {
                            const scale = Math.min(1, maxWidth / img.width);
                            let canvas = document.createElement('canvas');
                            canvas.width = Math.round(img.width * scale);
                            canvas.height = Math.round(img.height * scale);
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            canvas = autoCropDocument(canvas);
                            applyScannerFilter(canvas);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        } catch (err) { reject(err); }
                    };
                    img.onerror = () => reject(new Error('Could not load image'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('Could not read file'));
                reader.readAsDataURL(file);
            });
        }

        function autoCropDocument(srcCanvas) {
            const w = srcCanvas.width, h = srcCanvas.height;
            if (w < 80 || h < 80) return srcCanvas;
            const detW = 240;
            const detH = Math.max(80, Math.round(detW * h / w));
            const detCanvas = document.createElement('canvas');
            detCanvas.width = detW; detCanvas.height = detH;
            detCanvas.getContext('2d').drawImage(srcCanvas, 0, 0, detW, detH);
            const detData = detCanvas.getContext('2d').getImageData(0, 0, detW, detH).data;
            const gray = new Float32Array(detW * detH);
            for (let i = 0, p = 0; i < detData.length; i += 4, p++) {
                gray[p] = (detData[i] + detData[i+1] + detData[i+2]) / 3;
            }
            const blurred = boxBlur2D(gray, detW, detH, 4);
            let maxB = 0;
            for (let p = 0; p < blurred.length; p++) if (blurred[p] > maxB) maxB = blurred[p];
            if (maxB < 60) return srcCanvas;
            const threshold = maxB * 0.88;
            const rowCount = new Int32Array(detH);
            const colCount = new Int32Array(detW);
            for (let y = 0; y < detH; y++) {
                for (let x = 0; x < detW; x++) {
                    if (blurred[y * detW + x] >= threshold) {
                        rowCount[y]++;
                        colCount[x]++;
                    }
                }
            }
            const rowMin = (detW * 0.25) | 0;
            const colMin = (detH * 0.25) | 0;
            let top = -1, bottom = -1, left = -1, right = -1;
            for (let y = 0; y < detH; y++) if (rowCount[y] >= rowMin) { top = y; break; }
            for (let y = detH - 1; y >= 0; y--) if (rowCount[y] >= rowMin) { bottom = y; break; }
            for (let x = 0; x < detW; x++) if (colCount[x] >= colMin) { left = x; break; }
            for (let x = detW - 1; x >= 0; x--) if (colCount[x] >= colMin) { right = x; break; }
            if (top < 0 || left < 0) return srcCanvas;
            const dW = right - left + 1, dH = bottom - top + 1;
            if (dW < detW * 0.15 || dH < detH * 0.15) return srcCanvas;
            if (dW >= detW - 2 && dH >= detH - 2) return srcCanvas;
            const sx = w / detW, sy = h / detH;
            const pad = 10;
            const oLeft = Math.max(0, Math.round(left * sx) - pad);
            const oRight = Math.min(w - 1, Math.round(right * sx) + pad);
            const oTop = Math.max(0, Math.round(top * sy) - pad);
            const oBottom = Math.min(h - 1, Math.round(bottom * sy) + pad);
            const newW = oRight - oLeft + 1, newH = oBottom - oTop + 1;
            const out = document.createElement('canvas');
            out.width = newW; out.height = newH;
            out.getContext('2d').drawImage(srcCanvas, oLeft, oTop, newW, newH, 0, 0, newW, newH);
            return out;
        }

        function applyScannerFilter(canvas) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            const gray = new Float32Array(w * h);
            for (let i = 0, p = 0; i < data.length; i += 4, p++) {
                gray[p] = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            }
            const radius = Math.max(20, Math.floor(Math.min(w, h) / 18));
            const blurred = boxBlur2D(gray, w, h, radius);
            for (let p = 0, i = 0; p < gray.length; p++, i += 4) {
                const px = gray[p], avg = blurred[p];
                const cutoff = avg * 0.85;
                let v;
                if (px >= cutoff) {
                    v = 255;
                } else {
                    const t = px / cutoff;
                    v = (Math.pow(t, 1.15) * 255) | 0;
                }
                data[i] = data[i+1] = data[i+2] = v;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function boxBlur2D(src, w, h, radius) {
            const tmp = new Float32Array(w * h);
            const dst = new Float32Array(w * h);
            const winSize = radius * 2 + 1;
            for (let y = 0; y < h; y++) {
                let sum = 0;
                for (let i = -radius; i <= radius; i++) {
                    const x = i < 0 ? 0 : (i >= w ? w - 1 : i);
                    sum += src[y * w + x];
                }
                for (let x = 0; x < w; x++) {
                    tmp[y * w + x] = sum / winSize;
                    const outX = x - radius < 0 ? 0 : x - radius;
                    const inX = x + radius + 1 >= w ? w - 1 : x + radius + 1;
                    sum -= src[y * w + outX];
                    sum += src[y * w + inX];
                }
            }
            for (let x = 0; x < w; x++) {
                let sum = 0;
                for (let i = -radius; i <= radius; i++) {
                    const y = i < 0 ? 0 : (i >= h ? h - 1 : i);
                    sum += tmp[y * w + x];
                }
                for (let y = 0; y < h; y++) {
                    dst[y * w + x] = sum / winSize;
                    const outY = y - radius < 0 ? 0 : y - radius;
                    const inY = y + radius + 1 >= h ? h - 1 : y + radius + 1;
                    sum -= tmp[outY * w + x];
                    sum += tmp[inY * w + x];
                }
            }
            return dst;
        }

        function uploadTicket(sId, lId) {
            document.querySelectorAll('.swipe-container').forEach(c => c.classList.remove('swiped', 'swiped-right'));
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.style.display = 'none';
            document.body.appendChild(input);
            input.onchange = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) { input.remove(); return; }
                try {
                    const dataUrl = await compressImage(file, 1024, 0.7);
                    saveTicket(sId, lId, dataUrl);
                } catch (err) {
                    alert('Failed to process image: ' + (err.message || err));
                } finally {
                    input.remove();
                }
            };
            input.click();
        }

        function saveTicket(sId, lId, dataUrl) {
            let h = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const sIdx = h.findIndex(s => s.id == sId);
            if (sIdx === -1) return;
            const lIdx = h[sIdx].loads.findIndex(l => l.id == lId);
            if (lIdx === -1) return;
            h[sIdx].loads[lIdx].ticket = dataUrl;
            try {
                localStorage.setItem('driver_history', JSON.stringify(h));
                renderHistory();
            } catch (err) {
                alert('Storage full. Delete some older settlements or photos to free up space.');
            }
        }

        function removeTicket(sId, lId) {
            let h = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const sIdx = h.findIndex(s => s.id == sId);
            if (sIdx === -1) return;
            const lIdx = h[sIdx].loads.findIndex(l => l.id == lId);
            if (lIdx === -1) return;
            delete h[sIdx].loads[lIdx].ticket;
            localStorage.setItem('driver_history', JSON.stringify(h));
            renderHistory();
        }

        function viewTicket(sId, lId) {
            const h = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const s = h.find(s => s.id == sId);
            if (!s) return;
            const l = s.loads.find(l => l.id == lId);
            if (!l || !l.ticket) return;
            const overlay = document.createElement('div');
            overlay.className = 'ticket-overlay';
            overlay.innerHTML = `
                <img src="${l.ticket}" alt="Load ticket">
                <div class="ticket-overlay-actions">
                    <button class="vt-close" style="background:#1e293b;">CLOSE</button>
                    <button class="vt-retake" style="background:#3b82f6;">RETAKE</button>
                    <button class="vt-delete" style="background:#ef4444;">DELETE</button>
                </div>
            `;
            document.body.appendChild(overlay);
            const close = () => overlay.remove();
            overlay.querySelector('.vt-close').onclick = close;
            overlay.querySelector('.vt-retake').onclick = () => { close(); uploadTicket(sId, lId); };
            overlay.querySelector('.vt-delete').onclick = () => { removeTicket(sId, lId); close(); };
        }

        function renderHistory(){
            const history = JSON.parse(localStorage.getItem('driver_history') || '[]');
            const list = document.getElementById('historyList');

            const expandedEntries = new Set();
            list.querySelectorAll('.glass.expanded').forEach(c => {
                if (c.dataset.entryId) expandedEntries.add(c.dataset.entryId);
            });
            const collapsedDayKeys = new Set();
            list.querySelectorAll('.day-section.collapsed').forEach(s => {
                const card = s.closest('.glass');
                if (card && card.dataset.entryId && s.dataset.day) {
                    collapsedDayKeys.add(card.dataset.entryId + '|' + s.dataset.day);
                }
            });

            list.innerHTML = '';
            const latestDate = history.length > 0 ? Math.max(...history.map(e => new Date(e.payoutDate).getTime())) : null;
            history.forEach(entry => {
                let totalNet = 0;
                const grouped = {};
                const isCurrent = new Date(entry.payoutDate).getTime() === latestDate;
                entry.loads.forEach(l => {
                    const pay = (getRate(l.miles) * l.tons * 0.30);
                    totalNet += pay;
                    if(!grouped[l.day]) grouped[l.day] = [];
                    grouped[l.day].push({ ...l, pay });
                });
                const cameraSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;
                let breakdownHtml = '';
                for(const day in grouped) {
                    const dayTotal = grouped[day].reduce((sum, item) => sum + item.pay, 0);
                    breakdownHtml += `
                        <div class="day-section" data-day="${day}">
                            <div class="flex justify-between items-center mb-3 px-1 day-header" onclick="toggleDay(this, event)">
                                <span class="day-header-text">${day}</span>
                                <span class="day-total-text">$${dayTotal.toFixed(2)}</span>
                            </div>
                            <div class="day-loads">
                                ${grouped[day].map(l => `
                                    <div class="swipe-container" id="container-${l.id}"
                                         ontouchstart="ts(event, '${l.id}')"
                                         ontouchmove="tm(event, '${l.id}')"
                                         ontouchend="te(event, '${l.id}')">
                                        <div class="upload-box-flat" onclick="${l.ticket ? `viewTicket('${entry.id}','${l.id}')` : `uploadTicket('${entry.id}','${l.id}')`}">${l.ticket ? 'VIEW' : 'UPLOAD'}</div>
                                        <div class="delete-box-flat" onclick="removeLoad('${entry.id}', '${l.id}')">DELETE</div>
                                        <div class="swipe-content">
                                            <div class="flex flex-col">
                                                <div class="flex items-center">
                                                    <span class="text-lg font-bold text-gray-100">${l.miles} miles</span>
                                                    ${l.ticket ? `<span class="ticket-icon" onclick="event.stopPropagation();viewTicket('${entry.id}','${l.id}')">${cameraSvg}</span>` : ''}
                                                </div>
                                                <div class="flex items-center text-[10px] text-gray-500 font-bold uppercase">
                                                    <span>${l.tons} TONS</span>
                                                    <button onclick="editTons('${entry.id}', '${l.id}')" class="edit-btn">EDIT</button>
                                                </div>
                                            </div>
                                            <span class="mileage-pay-text">$${l.pay.toFixed(2)}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                }
                const card = document.createElement('div');
                card.className = 'glass p-6';
                card.dataset.entryId = entry.id;
                if (expandedEntries.has(String(entry.id))) card.classList.add('expanded');
                card.onclick = (e) => { if(!e.target.closest('.swipe-container') && !e.target.closest('button') && !e.target.closest('.day-header')) card.classList.toggle('expanded'); };
                card.innerHTML = `
                    <div class="flex justify-between items-center relative">
                        <div>
                            <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Settlement</p>
                            <p class="text-xl font-black tracking-tight">${new Date(entry.payoutDate + 'T00:00:00').toLocaleDateString('en-US', {month:'short', day:'numeric'})}</p>
                        </div>
                        ${isCurrent ? '<span class="blink-current text-blue-500/80 absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">CURRENT</span>' : ''}
                        <p class="text-2xl font-black text-green-400 tracking-tighter">$${totalNet.toFixed(2)}</p>
                    </div>
                    <div class="details-panel" onclick="event.stopPropagation()">
                        ${breakdownHtml}
                        <div class="flex gap-2 mt-4">
                            <button onclick="addManualToCard('${entry.id}', '${entry.payoutDate}')" class="flex-1 bg-blue-500/20 text-blue-400 py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95">+ Add Load</button>
                            <button onclick="if(confirm('Delete settlement?')){ localStorage.setItem('driver_history', JSON.stringify(JSON.parse(localStorage.getItem('driver_history')).filter(s=>s.id!='${entry.id}'))); renderHistory(); }" class="flex-1 bg-red-500/10 text-red-400 py-4 rounded-xl font-black text-xs uppercase tracking-widest text-center active:scale-95">Delete All</button>
                        </div>
                    </div>`;
                card.querySelectorAll('.day-section').forEach(s => {
                    if (collapsedDayKeys.has(String(entry.id) + '|' + s.dataset.day)) {
                        s.classList.add('collapsed');
                    }
                });
                list.appendChild(card);
            });

            renderFooterStats();
        }

        let xStart = null;
        let startState = null;
        function ts(e, id) {
            xStart = e.touches[0].clientX;
            const el = document.getElementById('container-' + id);
            if (!el) { startState = 'neutral'; return; }
            if (el.classList.contains('swiped')) startState = 'swiped';
            else if (el.classList.contains('swiped-right')) startState = 'swiped-right';
            else startState = 'neutral';
        }
        function tm(e, id) {
            if (xStart === null) return;
            const xDiff = xStart - e.touches[0].clientX;
            const el = document.getElementById('container-' + id);
            if (!el) return;
            if (xDiff > 40) {
                if (startState === 'swiped-right') {
                    el.classList.remove('swiped-right');
                } else if (startState === 'neutral') {
                    document.querySelectorAll('.swipe-container').forEach(c => { if(c.id !== 'container-'+id) c.classList.remove('swiped', 'swiped-right'); });
                    el.classList.add('swiped');
                }
            } else if (xDiff < -40) {
                if (startState === 'swiped') {
                    el.classList.remove('swiped');
                } else if (startState === 'neutral') {
                    document.querySelectorAll('.swipe-container').forEach(c => { if(c.id !== 'container-'+id) c.classList.remove('swiped', 'swiped-right'); });
                    el.classList.add('swiped-right');
                }
            }
        }
        function te() { xStart = null; startState = null; }

        function addManualToCard(sId, pDate) {
            const input = prompt("Enter mileage (comma-separated for multiple):");
            if (!input) return;
            const miles = input.split(',').map(m => parseFloat(m.trim())).filter(m => !isNaN(m));
            if (miles.length === 0) return;
            const day = prompt("Enter Day (e.g. Monday):");
            if (!day) return;
            modifySettlement(pDate, miles, day);
            renderHistory();
        }

        // ===== REVENUE STATS + CHART =====
        function getPayments() {
            const history = JSON.parse(localStorage.getItem('driver_history') || '[]');
            return history.map(s => {
                let total = 0;
                s.loads.forEach(l => { total += getRate(l.miles) * l.tons * 0.30; });
                return { date: new Date(s.payoutDate + 'T00:00:00'), amount: total };
            });
        }

        function fmtShort(n) {
            if (n >= 1000) return '$' + (n / 1000).toFixed(1) + 'K';
            return '$' + Math.round(n);
        }
        function fmtFull(n) {
            return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function renderFooterStats() {
            const payments = getPayments();
            const now = new Date();
            let monthly = 0, yearly = 0, lifetime = 0;
            payments.forEach(p => {
                lifetime += p.amount;
                if (p.date.getFullYear() === now.getFullYear()) {
                    yearly += p.amount;
                    if (p.date.getMonth() === now.getMonth()) monthly += p.amount;
                }
            });
            const m = document.getElementById('footerMonthly');
            const y = document.getElementById('footerYearly');
            const l = document.getElementById('footerLifetime');
            if (m) m.textContent = fmtShort(monthly);
            if (y) y.textContent = fmtShort(yearly);
            if (l) l.textContent = fmtShort(lifetime);
        }

        function showRevenueChart(timeframe) {
            const payments = getPayments();
            const now = new Date();
            let bars = [];
            let title = '';
            let total = 0;

            if (timeframe === 'month') {
                title = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                const monthPayments = payments
                    .filter(p => p.date.getMonth() === now.getMonth() && p.date.getFullYear() === now.getFullYear())
                    .sort((a, b) => a.date - b.date);
                bars = monthPayments.map(p => ({
                    label: p.date.getDate().toString(),
                    value: p.amount
                }));
                total = monthPayments.reduce((s, p) => s + p.amount, 0);
            } else if (timeframe === 'year') {
                title = now.getFullYear().toString();
                const monthsArr = Array(12).fill(0);
                payments.forEach(p => {
                    if (p.date.getFullYear() === now.getFullYear()) {
                        monthsArr[p.date.getMonth()] += p.amount;
                        total += p.amount;
                    }
                });
                const monthLabels = ['J','F','M','A','M','J','J','A','S','O','N','D'];
                bars = monthsArr.map((v, i) => ({ label: monthLabels[i], value: v }));
            } else {
                title = 'All Time';
                const years = {};
                payments.forEach(p => {
                    const y = p.date.getFullYear();
                    years[y] = (years[y] || 0) + p.amount;
                    total += p.amount;
                });
                bars = Object.keys(years).sort().map(y => ({ label: y, value: years[y] }));
            }

            document.getElementById('chartTitle').textContent = title;
            document.getElementById('chartTotal').textContent = fmtFull(total);

            const body = document.getElementById('chartBody');
            if (bars.length === 0 || total === 0) {
                body.innerHTML = '<div class="chart-empty">No revenue logged for this period yet.</div>';
            } else {
                const max = Math.max(...bars.map(b => b.value), 1);
                const showValues = bars.length <= 6;
                body.innerHTML = `<div class="chart-bars">${bars.map(b => {
                    const pct = b.value > 0 ? (b.value / max) * 100 : 0;
                    const valueLabel = (showValues && b.value > 0) ? fmtShort(b.value) : '';
                    return `
                        <div class="chart-bar-wrap">
                            <div class="chart-bar-value">${valueLabel}</div>
                            <div class="chart-bar-track">
                                <div class="chart-bar ${b.value === 0 ? 'empty' : ''}" data-target="${pct}"></div>
                            </div>
                            <div class="chart-bar-label">${b.label}</div>
                        </div>
                    `;
                }).join('')}</div>`;
            }

            document.getElementById('chartOverlay').classList.add('active');

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    body.querySelectorAll('.chart-bar').forEach(bar => {
                        bar.style.height = bar.dataset.target + '%';
                    });
                });
            });
        }

        function closeChart() {
            document.getElementById('chartOverlay').classList.remove('active');
        }

        document.getElementById('chartOverlay').addEventListener('click', e => {
            if (e.target.id === 'chartOverlay') closeChart();
        });

        renderHistory();
    </script>
</body>
</html>
