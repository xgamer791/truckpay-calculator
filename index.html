<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TruckPay Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', system-ui; background: linear-gradient(to br, #0f172a, #1e293b); color: white; min-height: 100vh; padding: 24px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 48px; }
        .header h1 { font-size: 32px; font-weight: bold; background: linear-gradient(to right, #60a5fa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .header p { color: #94a3b8; font-size: 14px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; padding: 24px; }
        .card h2 { color: #60a5fa; margin-bottom: 16px; font-size: 18px; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        button { padding: 12px 16px; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-upload { background: #2563eb; color: white; }
        .btn-upload:hover { background: #1d4ed8; }
        .btn-camera { background: #0891b2; color: white; }
        .btn-camera:hover { background: #0e7490; }
        .btn-add { background: #059669; color: white; }
        input[type="text"], input[type="number"] { background: rgba(30, 41, 59, 0.5); border: 1px solid #475569; border-radius: 8px; padding: 8px 12px; color: white; }
        input[type="file"] { display: none; }
        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .setting-field label { display: block; font-size: 14px; color: #cbd5e1; margin-bottom: 8px; font-weight: 500; }
        .summary-value { font-size: 32px; font-weight: bold; background: linear-gradient(to right, #4ade80, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: monospace; }
        table { width: 100%; margin-top: 24px; font-size: 14px; }
        th { text-align: left; padding: 12px; color: #60a5fa; font-weight: 600; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid rgba(148, 163, 184, 0.1); }
        .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 TruckPay</h1>
            <p>Professional pay calculator with photo OCR</p>
        </div>

        <div class="grid">
            <div style="display: grid; gap: 24px;">
                <div class="card">
                    <h2>📸 Mileage Input</h2>
                    <div class="button-group">
                        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📤 Upload</button>
                        <button class="btn-camera" onclick="document.getElementById('cameraInput').click()">📷 Camera</button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" onchange="processImage(this.files[0])">
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="processImage(this.files[0])">
                    
                    <div style="border-top: 1px solid #475569; padding-top: 16px; margin-top: 16px;">
                        <p style="font-size: 14px; color: #94a3b8; margin-bottom: 12px;">Manual entry</p>
